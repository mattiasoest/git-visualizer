services:
  backend:
    image: ${GHCR_IMAGE:-ghcr.io/mattiasoest/git-visualizer-backend:latest}
    pull_policy: always
    ports:
      - "127.0.0.1:${SERVER_PORT:-8080}:8080"
    environment:
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      SPRING_WEB_CORS_ALLOWED_ORIGINS: ${SPRING_WEB_CORS_ALLOWED_ORIGINS:-}
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    restart: unless-stopped
