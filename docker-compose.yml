services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile.dev
    ports:
      - "8080:8080"
    environment:
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      SPRING_WEB_CORS_ALLOWED_ORIGINS: http://localhost:5173
    volumes:
      - ./backend:/app/backend
      - maven-cache:/root/.m2

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile.dev
    ports:
      - "5173:5173"
    environment:
      VITE_API_PROXY_TARGET: http://backend:8080
    volumes:
      - ./frontend:/app/frontend
      - frontend-node-modules:/app/frontend/node_modules
    depends_on:
      - backend

volumes:
  maven-cache:
  frontend-node-modules:
