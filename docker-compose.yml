services:
  server:
    build:
      context: .
      dockerfile: server/Dockerfile.dev
    ports:
      - "8080:8080"
    environment:
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      SPRING_WEB_CORS_ALLOWED_ORIGINS: http://localhost:5173
    volumes:
      - ./server:/app/server
      - maven-cache:/root/.m2

  client:
    build:
      context: .
      dockerfile: client/Dockerfile.dev
    ports:
      - "5173:5173"
    environment:
      VITE_API_PROXY_TARGET: http://server:8080
    volumes:
      - ./client:/app/client
      - client-node-modules:/app/client/node_modules
    depends_on:
      - server

volumes:
  maven-cache:
  client-node-modules:
